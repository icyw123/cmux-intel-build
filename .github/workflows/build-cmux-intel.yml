name: build-cmux-intel

# Build cmux v0.27.0 for Intel Macs running macOS 13 (Ventura).
# v0.27.0 is the last release whose deployment target is macOS 13.0, so it does
# NOT depend on the macOS 14 Swift Observation runtime (libswiftObservation.dylib).
#
# We run on an arm64 runner (macos-14, fast to allocate) and CROSS-COMPILE x86_64:
#  - GhosttyKit is built with xcframework-target=native, but GhosttyXCFramework.zig
#    is patched so the "native" slice targets x86_64 (not the arm64 host). This keeps
#    the build macOS-only (no iOS slice -> avoids the CoreVideo iOS compile error).
#  - Xcode 16.x is used: this ghostty fork references kCVPixelFormatType_30RGB_r210,
#    which only exists in the macOS 15 SDK. The cmux app still targets macOS 13.0.
on:
  workflow_dispatch: {}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        runner: [macos-14]   # arm64 runner (fast queue); we cross-compile x86_64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    steps:
      - name: Checkout cmux@v0.27.0 (with submodules)
        uses: actions/checkout@v4
        with:
          repository: manaflow-ai/cmux
          ref: v0.27.0
          submodules: recursive
          fetch-depth: 1

      - name: Select Xcode 16.x (macOS 15 SDK; ghostty needs kCVPixelFormatType_30RGB_r210)
        run: |
          for x in 16.4 16.3 16.2 16.1 16.0; do
            if [ -d "/Applications/Xcode_$x.app" ]; then
              sudo xcode-select -s "/Applications/Xcode_$x.app"; echo "selected Xcode $x"; break
            fi
          done

      - name: Toolchain info
        run: |
          sw_vers; echo "host arch: $(uname -m)"; xcodebuild -version; swift --version

      - name: Install Zig 0.15.2 (match runner arch)
        run: |
          A=$(uname -m); if [ "$A" = "arm64" ]; then Z=aarch64; else Z=x86_64; fi
          curl -fL --retry 3 -o zig.tar.xz "https://ziglang.org/download/0.15.2/zig-${Z}-macos-0.15.2.tar.xz"
          tar xf zig.tar.xz
          echo "$PWD/zig-${Z}-macos-0.15.2" >> "$GITHUB_PATH"

      - name: Verify zig
        run: zig version

      - name: Patch Backport.swift (remove macOS 15-only pointerStyle symbols)
        run: |
          python3 - <<'PY'
          import re
          p = "Sources/Backport.swift"
          s = open(p).read()
          # 1) Drop the macOS-15 pointerStyle() call (the symbol/type is absent from the macOS 14 SDK).
          s = s.replace("content.pointerStyle(style?.official)", "content")
          # 2) Remove the whole macOS-15 `official: PointerStyle` computed property block.
          s = re.sub(
              r"\n    #if canImport\(AppKit\)\n    @available\(macOS 15, \*\)\n    var official: PointerStyle \{.*?\n    #endif\n",
              "\n", s, flags=re.S)
          open(p, "w").write(s)
          assert ".official" not in s, ".official still referenced"
          assert "var official" not in s, "macOS15 official property still present"
          assert "content.pointerStyle" not in s, "macOS15 pointerStyle call still present"
          print("Backport.swift patched OK")
          PY

      - name: Patch WindowDecorationsController.swift (fix macOS 13 traffic lights)
        run: |
          python3 - <<'PY'
          p="Sources/WindowDecorationsController.swift"
          s=open(p).read()
          s=s.replace("    private var didStart = false", "    private var didStart = false\n    private var nudgedWindows = Set<ObjectIdentifier>()")
          old="    func apply(to window: NSWindow) {\n        let shouldHideButtons = shouldHideTrafficLights(for: window)\n        hideStandardButtons(on: window, hidden: shouldHideButtons)\n    }"
          new="    func apply(to window: NSWindow) {\n        let shouldHideButtons = shouldHideTrafficLights(for: window)\n        hideStandardButtons(on: window, hidden: shouldHideButtons)\n        if !shouldHideButtons { nudgeTrafficLightLayout(window) }\n    }\n\n    private func nudgeTrafficLightLayout(_ window: NSWindow) {\n        let id = ObjectIdentifier(window)\n        guard !nudgedWindows.contains(id) else { return }\n        guard !window.styleMask.contains(.fullScreen) else { return }\n        nudgedWindows.insert(id)\n        DispatchQueue.main.asyncAfter(deadline: .now() + 0.3) {\n            guard !window.styleMask.contains(.fullScreen) else { return }\n            var token: NSObjectProtocol?\n            token = NotificationCenter.default.addObserver(forName: NSWindow.didEnterFullScreenNotification, object: window, queue: .main) { _ in\n                if let token { NotificationCenter.default.removeObserver(token) }\n                window.toggleFullScreen(nil)\n            }\n            window.toggleFullScreen(nil)\n        }\n    }"
          assert old in s, "apply() not found"
          s=s.replace(old,new)
          open(p,"w").write(s)
          assert "nudgeTrafficLightLayout" in s
          print("WindowDecorationsController patched")
          PY

      - name: Patch GhosttyXCFramework.zig -> force x86_64 for the native slice
        run: |
          f=ghostty/src/build/GhosttyXCFramework.zig
          perl -0777 -pi -e 's/genericMacOSTarget\(b, null\)/genericMacOSTarget(b, .x86_64)/' "$f"
          echo "--- patched line ---"
          grep -n "genericMacOSTarget(b, .x86_64)" "$f"

      - name: Build GhosttyKit.xcframework (native slice forced to x86_64; no iOS)
        run: |
          cd ghostty
          # -Demit-macos-app=false: only build the xcframework cmux needs; do NOT also build
          # Ghostty's own .app (it fails under the macOS 15 SDK due to macOS 26 "Tahoe" code).
          zig build -Demit-xcframework=true -Demit-macos-app=false -Dxcframework-target=native -Doptimize=ReleaseFast
          cd ..
          ln -sf ghostty/macos/GhosttyKit.xcframework GhosttyKit.xcframework
          echo "--- xcframework contents ---"
          ls -R ghostty/macos/GhosttyKit.xcframework | head -40
          find ghostty/macos/GhosttyKit.xcframework -name "*.a" -exec sh -c 'echo "{}: $(lipo -archs "{}" 2>/dev/null)"' \;

      - name: Build cmux.app (x86_64, deployment target 13.0, unsigned)
        run: |
          set -o pipefail
          xcodebuild \
            -project GhosttyTabs.xcodeproj \
            -scheme cmux \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -skipMacroValidation \
            ARCHS=x86_64 ONLY_ACTIVE_ARCH=NO \
            MACOSX_DEPLOYMENT_TARGET=13.0 \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" \
            build

      - name: Package (ad-hoc sign + zip)
        run: |
          APP="$(find "$HOME/Library/Developer/Xcode/DerivedData" -path "*/Build/Products/Release/cmux.app" -print -quit)"
          echo "Built app: $APP"
          test -n "$APP"
          codesign --force --deep --sign - "$APP"
          echo "--- final binary verification ---"
          lipo -archs "$APP/Contents/MacOS/cmux"
          otool -l "$APP/Contents/MacOS/cmux" | grep -A3 LC_BUILD_VERSION | grep -E "minos|sdk" || true
          ditto -c -k --keepParent "$APP" "cmux-intel-${{ matrix.runner }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cmux-intel-x86_64
          path: cmux-intel-${{ matrix.runner }}.zip
          if-no-files-found: error
